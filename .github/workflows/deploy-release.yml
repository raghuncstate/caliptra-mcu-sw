name: Deploy Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and deploy
        required: true
        default: main
      release_tag:
        description: Release tag to publish when create_github_release is true
        required: false
        default: ""
      create_github_release:
        description: Create or update a GitHub release with the firmware bundle
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build_release_bundle:
    runs-on: [e2-standard-16-big-disk]
    timeout-minutes: 60

    outputs:
      sha: ${{ steps.revision.outputs.sha }}

    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_VERSION: 0.8.2
      SCCACHE_GHA_CACHE_TO: sccache-caliptra-mcu-sw
      SCCACHE_GHA_CACHE_FROM: sccache-caliptra-mcu-sw
      SCCACHE_C_CUSTOM_CACHE_BUSTER: 62f871a3afb0
      EXTRA_CARGO_CONFIG: 'target.''cfg(all())''.rustflags = ["-Dwarnings"]'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive

      - name: Record release revision
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install required packages
        run: |
          sudo apt-get update -qy && \
          sudo apt-get install -qy build-essential curl git && \
          rustup toolchain install -c clippy,rust-src,llvm-tools,rustfmt,rustc-dev

      - name: Restore sccache binary
        uses: actions/cache/restore@v3
        id: sccache_bin_restore
        with:
          path: ~/.cargo/bin/sccache
          key: sccache-bin-${{ env.SCCACHE_VERSION }}-${{ env.SCCACHE_C_CUSTOM_CACHE_BUSTER }}

      - name: Install sccache
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        run: |
          cargo install sccache --version ${SCCACHE_VERSION} --no-default-features --features=gha --locked

      - name: Save sccache binary
        uses: actions/cache/save@v3
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        with:
          path: ~/.cargo/bin/sccache
          key: ${{ steps.sccache_bin_restore.outputs.cache-primary-key }}

      - name: Configure sccache
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('RUSTC_WRAPPER', process.env.HOME + '/.cargo/bin/sccache');
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Build release firmware bundle
        run: |
          cargo run -p xtask --features parallel-build -- all-build \
            --platform emulator --separate-runtimes \
            --profile release
          test -f target/all-fw-release.zip
          sccache --show-stats

      - name: Upload release firmware bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-firmware-bundle
          path: target/all-fw-release.zip
          if-no-files-found: error
          retention-days: 14

  publish_github_release:
    if: ${{ inputs.create_github_release == true }}
    needs: build_release_bundle
    runs-on: ubuntu-latest

    steps:
      - name: Validate release tag
        run: |
          if [ -z "${{ inputs.release_tag }}" ]; then
            echo "release_tag is required when create_github_release is true"
            exit 1
          fi

      - name: Download release firmware bundle
        uses: actions/download-artifact@v4
        with:
          name: release-firmware-bundle

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_TARGET: ${{ needs.build_release_bundle.outputs.sha }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" all-fw-release.zip --clobber
          else
            gh release create "$RELEASE_TAG" all-fw-release.zip \
              --target "$RELEASE_TARGET" \
              --title "Caliptra MCU SW $RELEASE_TAG" \
              --notes "Manual release generated by the Deploy Release workflow."
          fi
